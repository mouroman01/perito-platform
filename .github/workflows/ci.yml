name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: perito_os
          POSTGRES_PASSWORD: perito_os
          POSTGRES_DB: perito_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U perito_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        # A imagem bitnami sobe o "minio server" automaticamente (as service containers
        # do GitHub Actions não permitem passar um comando/args customizado).
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: perito_os
          MINIO_ROOT_PASSWORD: troque-esta-chave-em-producao
        ports:
          - 9000:9000

    env:
      # A conftest deriva a DATABASE_URL de teste desta base, acrescentando o
      # search_path para o schema isolado (perito_os_test).
      TEST_DATABASE_URL: postgresql+psycopg2://perito_os:perito_os@localhost:5432/perito_os
      # Casam com os defaults de settings; garantem que os testes de evidência (MinIO) rodem.
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: perito_os
      MINIO_SECRET_KEY: troque-esta-chave-em-producao
      MINIO_BUCKET: perito-os
      MINIO_SECURE: "False"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instala dependências
        run: pip install -r requirements-dev.txt

      - name: Roda os testes
        run: pytest

  frontend:
    name: Frontend (typecheck + vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configura Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instala dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck + build
        run: npm run build

      - name: Testes (vitest)
        run: npm run test
