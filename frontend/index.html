<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perito OS</title>
    <script>
      // Aplica o tema salvo (ou a preferência do sistema) ANTES do render,
      // evitando o "flash" de tema claro ao abrir no escuro.
      (function () {
        try {
          var salvo = localStorage.getItem("perito-os:tema")
          var escuro = salvo
            ? salvo === "escuro"
            : window.matchMedia("(prefers-color-scheme: dark)").matches
          if (escuro) document.documentElement.setAttribute("data-theme", "dark")
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
